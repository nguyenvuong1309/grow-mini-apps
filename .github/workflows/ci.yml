name: CI

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type / Lint / Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (all packages)
        run: pnpm typecheck

      - name: ESLint (all packages)
        run: pnpm lint

      - name: React Doctor (per package)
        run: |
          set -e
          for pkg in packages/*/; do
            echo "::group::$pkg"
            (cd "$pkg" && npx -y react-doctor@latest .)
            echo "::endgroup::"
          done
